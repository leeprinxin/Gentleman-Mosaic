<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>紳士打碼</title>
<style>
:root{--bg:#eef4ff;--panel:#ffffffd9;--line:#5f789633;--text:#152136;--muted:#66748c;--accent:#1f6fff;--danger:#e44c65;--chip-bg:#dce9ff;--chip-text:#1848a2;--checker:#f9fbff}
body.dark{--bg:#0f1623;--panel:#1a2436e6;--line:#8aa0bf33;--text:#e8eef8;--muted:#9fb0c9;--accent:#5aa2ff;--danger:#ff7a90;--chip-bg:#1f3b66;--chip-text:#cfe2ff;--checker:#202b3f}
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--text);background:linear-gradient(145deg,#f6f9ff,#eef4ff)}
body.dark{background:linear-gradient(145deg,#0d1420,#182238)}
.shell{width:min(1920px,98vw);margin:12px auto;display:grid;grid-template-columns:300px minmax(0,1fr);gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;backdrop-filter:blur(8px)}
.sidebar{padding:14px;display:flex;flex-direction:column;gap:10px}.title{margin:0;font-size:22px}.subtitle{margin:0;color:var(--muted);font-size:12px}
.brand{display:flex;flex-direction:column;align-items:flex-start;gap:6px;width:100%}.logo{width:100%;height:auto;object-fit:contain;border-radius:14px;background:#fff;border:1px solid var(--line);padding:6px;display:block}.version{font-size:12px;color:var(--muted);font-weight:700;line-height:1}
.top-tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.group{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;display:grid;gap:8px}.group-title{margin:0;font-size:12px;color:var(--muted);text-transform:uppercase}
.field{display:grid;gap:5px}.field label{font-size:12px;color:var(--muted)}.label-row{display:flex;justify-content:space-between}.hint{font-size:11px;padding:2px 8px;border-radius:999px;background:#dce9ff;color:#1848a2}
input,select,button{width:100%;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:14px;background:#fff;color:var(--text)}input[type="range"]{padding:6px}
button{cursor:pointer;font-weight:600}button:disabled{opacity:.45;cursor:not-allowed}.primary{background:linear-gradient(150deg,#2f7cff,#1f62dc);color:#fff}.warn{color:var(--danger)}.dark{background:#101826;color:#fff}
.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}.split3{display:grid;grid-template-columns:44px 1fr 44px;gap:8px}
.swatches{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px}.swatch-btn{height:26px;border-radius:8px;padding:0;border:2px solid #d8e2f0;cursor:pointer}.swatch-btn.active{border-color:#1f6fff;box-shadow:0 0 0 2px #1f6fff2a}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px}.seg-btn{padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);font-weight:700}.seg-btn.active{background:#1f6fff;color:#fff;border-color:#1f6fff}

.status{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chip{font-size:12px;background:var(--chip-bg);color:var(--chip-text);border-radius:999px;padding:4px 10px}
.canvas-wrap{flex:1;border-radius:12px;border:1px solid var(--line);overflow:hidden;background:linear-gradient(45deg,#ecf1fb 25%,transparent 25%) -12px 0/24px 24px,linear-gradient(-45deg,#ecf1fb 25%,transparent 25%) -12px 0/24px 24px,linear-gradient(45deg,transparent 75%,#ecf1fb 75%) -12px 0/24px 24px,linear-gradient(-45deg,transparent 75%,#ecf1fb 75%) -12px 0/24px 24px,var(--checker);display:block;position:relative;min-width:0;min-height:0}
.canvas-wrap.pan-ready{cursor:grab}.canvas-wrap.panning{cursor:grabbing}#canvas{display:block;position:absolute;left:22px;top:22px;margin:0;cursor:crosshair;transform-origin:top left}
.preview-inspect-badge{position:absolute;left:12px;top:12px;z-index:25;padding:8px 12px;border-radius:10px;border:2px solid #d90429;background:rgba(255,255,255,.92);color:#d90429;font:700 20px "Noto Sans TC","Microsoft JhengHei",sans-serif;display:none;pointer-events:none}
.icon{display:inline-block;min-width:16px;text-align:center}
.history{max-height:170px;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff;padding:6px}.hbtn{width:100%;text-align:left;background:transparent;border:1px solid transparent;padding:7px 8px;border-radius:8px;font-size:12px;color:#314157}.hbtn.active{background:#1f6fff1a;border-color:#1f6fff4d;color:#123c8a;font-weight:700}
.stage-right{position:relative;z-index:5;width:100%;display:grid;gap:8px;align-content:start}
.preview-card{display:grid;gap:6px;position:relative}.preview-card label{font-size:11px;color:var(--muted)}.preview-canvas{width:100%;height:110px;border:1px solid var(--line);border-radius:8px;background:#fff}
.tips{margin:0;font-size:12px;color:var(--muted);line-height:1.5}
body.dark .group,body.dark input,body.dark select,body.dark button,body.dark .history,body.dark .preview-canvas,body.dark .toolbar{background:#202d43;color:var(--text)}
body.dark .preview-inspect-badge{background:rgba(22,28,40,.92)}
@media (max-width:1180px){.shell{grid-template-columns:260px minmax(0,1fr)}.stage-body{grid-template-columns:minmax(0,1fr) 220px}}
@media (max-width:960px){.shell{grid-template-columns:1fr;margin:10px auto}.stage{min-height:64vh}.stage-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
<aside class="card sidebar">
<div class="brand"><img class="logo" src="./logo-Photoroom.png" alt="Logo" /><span class="version">v1.0.0</span></div><p class="subtitle" data-i18n="subtitle">小畫家式塗抹 + 單層套用 + 位置縮放檢視</p>
<div class="top-tools"><select id="langSelect"><option value="zh">中文</option><option value="en">English</option></select><button id="themeToggle" type="button">Dark</button></div>
<section class="group"><p class="group-title" data-i18n="group_image">圖片</p><div class="field"><label for="fileInput" data-i18n="load_image">載入圖片</label><input id="fileInput" type="file" accept="image/*" /></div></section>
<section class="group"><p class="group-title" data-i18n="group_effect_mode">效果與模式</p><div class="field"><label data-i18n="effect_mode">打碼效果</label><div id="effectModeToggle" class="seg"><button id="effectMosaicBtn" class="seg-btn active" type="button" data-value="mosaic" data-i18n="effect_mosaic">馬賽克</button><button id="effectBarBtn" class="seg-btn" type="button" data-value="bar" data-i18n="effect_nori">海苔</button></div><input id="effectMode" type="hidden" value="mosaic" /></div><div class="field"><label data-i18n="select_mode">選取模式</label><div id="modeToggle" class="seg"><button id="modeBrushBtn" class="seg-btn active" type="button" data-value="brush" data-i18n="mode_brush">塗抹</button><button id="modeRectBtn" class="seg-btn" type="button" data-value="rect" data-i18n="mode_rect">框選</button></div><input id="mode" type="hidden" value="brush" /></div></section>
<section class="group"><p class="group-title" data-i18n="group_params">參數</p><div class="field"><div class="label-row"><label for="tileSize" data-i18n="tile_size">顆粒尺寸</label><span id="tileHint" class="hint">14 px</span></div><input id="tileSize" type="range" min="1" max="30" value="14" /></div><div class="field"><div class="label-row"><label for="brushSize" data-i18n="brush_size">筆刷大小</label><span id="brushHint" class="hint">48 px</span></div><input id="brushSize" type="range" min="4" max="500" value="48" /></div><div class="field"><label for="brushShape" data-i18n="brush_shape">筆刷形狀</label><select id="brushShape"><option value="circle" data-i18n="shape_circle">圓形</option><option value="square" data-i18n="shape_square">正方形</option></select></div><div class="field"><label for="barColor" data-i18n="nori_color">海苔顏色（色票）</label><div id="barColorSwatches" class="swatches"><button class="swatch-btn active" type="button" data-color="#000000" style="background:#000000" title="#000000"></button><button class="swatch-btn" type="button" data-color="#ffffff" style="background:#ffffff" title="#ffffff"></button><button class="swatch-btn" type="button" data-color="#1f2937" style="background:#1f2937" title="#1f2937"></button><button class="swatch-btn" type="button" data-color="#ef4444" style="background:#ef4444" title="#ef4444"></button><button class="swatch-btn" type="button" data-color="#2563eb" style="background:#2563eb" title="#2563eb"></button><button class="swatch-btn" type="button" data-color="#22c55e" style="background:#22c55e" title="#22c55e"></button></div><div class="label-row"><label data-i18n="custom_color">自訂顏色</label><span class="hint">HEX / Picker</span></div><div class="split"><input id="barColor" type="text" value="#111111" maxlength="7" /><input id="barColorPicker" type="color" value="#111111" /></div></div><div class="field"><div class="label-row"><label for="barOpacity" data-i18n="nori_opacity">海苔透明度</label><span id="barOpacityHint" class="hint">85%</span></div><input id="barOpacity" type="range" min="0" max="100" value="85" /></div><div class="field"><div class="label-row"><label for="barWidth" data-i18n="nori_width">海苔寬度 (px)</label><span id="barWidthHint" class="hint">16 px</span></div><input id="barWidth" type="range" min="2" max="200" value="16" /></div><div class="field"><div class="label-row"><label for="barGap" data-i18n="nori_gap">海苔間隔 (px)</label><span id="barGapHint" class="hint">10 px</span></div><input id="barGap" type="range" min="0" max="120" value="10" /></div><div class="field"><label for="barDirection" data-i18n="nori_direction">海苔分割方向</label><select id="barDirection"><option value="horizontal" data-i18n="dir_horizontal">水平分割</option><option value="vertical" data-i18n="dir_vertical">垂直分割</option></select></div></section>
</aside>
<main class="card stage"><div class="toolbar"><span id="status" class="status" data-i18n="status_load_first">請先載入圖片</span><span id="modeChip" class="chip" data-i18n="mode_chip_brush">筆刷（不規則塗抹）</span></div><div class="stage-body"><div id="canvasWrap" class="canvas-wrap"><div id="previewInspectBadge" class="preview-inspect-badge" data-i18n="preview_mode">預覽圖模式</div><div class="stage-tools"><div class="zoom-chip"><span id="zoomHint" class="zoom-value">100%</span><button id="zoomResetBtn" class="icon-btn" type="button" title="重置縮放並置中">⌂</button></div><section class="group tool-group"><p class="group-title"><span class="icon">🛠</span></p><div class="icon-row"><button id="confirmBtn" class="icon-btn primary" type="button" data-tip="確定套用" title="確定套用" disabled>✔</button><button id="clearSelBtn" class="icon-btn" type="button" data-tip="清空待處理" title="清空待處理">⊘</button><button id="downloadBtn" class="icon-btn dark" type="button" data-tip="下載圖片" title="下載圖片">⬇</button></div><div class="icon-row"><button id="undoBtn" class="icon-btn" type="button" data-tip="上一動作" title="上一動作" disabled>↶</button><button id="redoBtn" class="icon-btn" type="button" data-tip="下一動作" title="下一動作" disabled>↷</button><button id="resetBtn" class="icon-btn warn" type="button" data-tip="重置圖片" title="重置圖片">⟲</button></div></section></div><canvas id="canvas"></canvas></div><div class="stage-right"><section class="group tool-group"><p class="group-title" data-i18n="effect_preview">效果預覽</p><div class="preview-card"><label data-i18n="effect">效果</label><canvas id="previewAfter" class="preview-canvas" width="220" height="120"></canvas></div></section><section class="group tool-group"><p class="group-title" data-i18n="history_title">歷史紀錄回溯</p><div id="historyList" class="history"></div></section></div></div></main>
</div>
<script>
const fileInput=document.getElementById("fileInput"),canvasWrap=document.getElementById("canvasWrap"),canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d",{willReadFrequently:true});

const tileHint=document.getElementById("tileHint"),brushHint=document.getElementById("brushHint"),barOpacityHint=document.getElementById("barOpacityHint"),barWidthHint=document.getElementById("barWidthHint"),barGapHint=document.getElementById("barGapHint"),zoomHint=document.getElementById("zoomHint"),zoomResetBtn=document.getElementById("zoomResetBtn"),previewInspectBadge=document.getElementById("previewInspectBadge"),confirmBtn=document.getElementById("confirmBtn"),clearSelBtn=document.getElementById("clearSelBtn"),undoBtn=document.getElementById("undoBtn"),redoBtn=document.getElementById("redoBtn"),resetBtn=document.getElementById("resetBtn"),downloadBtn=document.getElementById("downloadBtn"),historyList=document.getElementById("historyList"),statusText=document.getElementById("status"),modeChip=document.getElementById("modeChip"),previewAfter=document.getElementById("previewAfter");
const previewAfterCtx=previewAfter.getContext("2d");
let lastPreviewCanvas=null,statusMemo="請先載入圖片",isPreviewInspect=false,previewResumeStatus="",lang="zh";
let baseImageData=null,committedImageData=null,pendingItems=[],previewRect=null,liveStroke=null,isDrawing=false,startPoint=null,dragged=false,zoom=100,hoverPoint=null,panX=0,panY=0;
const history=[];let historyIndex=-1;const HISTORY_LIMIT=50;
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const cloneImageData=(d)=>new ImageData(new Uint8ClampedArray(d.data),d.width,d.height);
const i18n={zh:{app_name:"紳士打碼",subtitle:"小畫家式塗抹 + 單層套用 + 位置縮放檢視",group_image:"圖片",load_image:"載入圖片",group_effect_mode:"效果與模式",effect_mode:"打碼效果",effect_mosaic:"馬賽克",effect_nori:"海苔",select_mode:"選取模式",mode_brush:"塗抹",mode_rect:"框選",group_params:"參數",tile_size:"顆粒尺寸",brush_size:"筆刷大小",brush_shape:"筆刷形狀",shape_circle:"圓形",shape_square:"正方形",nori_color:"海苔顏色（色票）",custom_color:"自訂顏色",nori_opacity:"海苔透明度",nori_width:"海苔寬度 (px)",nori_gap:"海苔間隔 (px)",nori_direction:"海苔分割方向",dir_horizontal:"水平分割",dir_vertical:"垂直分割",effect_preview:"效果預覽",effect:"效果",history_title:"歷史紀錄回溯",preview_mode:"預覽圖模式",status_load_first:"請先載入圖片",mode_chip_brush:"筆刷（不規則塗抹）",mode_chip_rect:"矩形選取",mode_chip_preview:"預覽圖",mode_chip_applied_nori:"已套用海苔",mode_chip_applied_mosaic:"已套用馬賽克",reset_view:"重置縮放並置中",tip_confirm:"確定套用",tip_clear:"清空待處理",tip_download:"下載圖片",tip_undo:"上一動作",tip_redo:"下一動作",tip_reset:"重置圖片",status_preview:"預覽圖檢視中（滑鼠離開恢復）",status_cleared:"已清空待處理區塊",status_undo:"已回到上一動作",status_redo:"已前進到下一動作",status_reset_image:"已重置回原圖",status_loaded:"已載入",status_reset_view_fit:"已重設：完整顯示",status_reset_view_100:"已重設 100% 並置中",theme_dark:"Dark",theme_light:"Light"},en:{app_name:"Gentleman Mosaic",subtitle:"Paint-style brush + single-apply + zoom/pan view",group_image:"Image",load_image:"Load Image",group_effect_mode:"Effect & Mode",effect_mode:"Redaction Effect",effect_mosaic:"Mosaic",effect_nori:"Nori",select_mode:"Selection Mode",mode_brush:"Brush",mode_rect:"Box",group_params:"Parameters",tile_size:"Tile Size",brush_size:"Brush Size",brush_shape:"Brush Shape",shape_circle:"Circle",shape_square:"Square",nori_color:"Nori Color (Swatches)",custom_color:"Custom Color",nori_opacity:"Nori Opacity",nori_width:"Nori Width (px)",nori_gap:"Nori Gap (px)",nori_direction:"Nori Direction",dir_horizontal:"Horizontal",dir_vertical:"Vertical",effect_preview:"Effect Preview",effect:"Effect",history_title:"History",preview_mode:"Preview Mode",status_load_first:"Load an image first",mode_chip_brush:"Brush",mode_chip_rect:"Rectangle",mode_chip_preview:"Preview",mode_chip_applied_nori:"Nori applied",mode_chip_applied_mosaic:"Mosaic applied",reset_view:"Reset zoom and center",tip_confirm:"Apply",tip_clear:"Clear selection",tip_download:"Download",tip_undo:"Undo",tip_redo:"Redo",tip_reset:"Reset image",status_preview:"Preview mode (leave to restore)",status_cleared:"Pending selection cleared",status_undo:"Moved to previous action",status_redo:"Moved to next action",status_reset_image:"Reset to original image",status_loaded:"Loaded",status_reset_view_fit:"Reset: fit image",status_reset_view_100:"Reset to 100% and centered",theme_dark:"Dark",theme_light:"Light"}};

function applyI18n(){document.documentElement.lang=lang==="zh"?"zh-Hant":"en";document.title=tr("app_name");document.querySelectorAll("[data-i18n]").forEach((el)=>{el.textContent=tr(el.dataset.i18n)});zoomResetBtn.title=tr("reset_view");confirmBtn.title=confirmBtn.dataset.tip=tr("tip_confirm");clearSelBtn.title=clearSelBtn.dataset.tip=tr("tip_clear");downloadBtn.title=downloadBtn.dataset.tip=tr("tip_download");undoBtn.title=undoBtn.dataset.tip=tr("tip_undo");redoBtn.title=redoBtn.dataset.tip=tr("tip_redo");resetBtn.title=resetBtn.dataset.tip=tr("tip_reset");themeToggle.textContent=document.body.classList.contains("dark")?tr("theme_light"):tr("theme_dark");syncModeChip();if(!statusMemo||statusMemo===i18n.zh.status_load_first||statusMemo===i18n.en.status_load_first)setStatus(tr("status_load_first"))}

function applyCanvasPosition(){canvas.style.left=`${22+panX}px`;canvas.style.top=`${22+panY}px`}function fitZoomPercent(){if(!canvas.width)return 100;const wrapRect=canvasWrap.getBoundingClientRect();const availW=Math.max(40,wrapRect.width-44),availH=Math.max(40,wrapRect.height-44);const fit=Math.floor(Math.min((availW/canvas.width)*100,(availH/canvas.height)*100));return clamp(fit,10,100)}function centerView(){if(!canvas.width)return;const wrapRect=canvasWrap.getBoundingClientRect();const sw=canvas.width*zoom/100,sh=canvas.height*zoom/100;panX=(wrapRect.width-sw)/2-22;panY=(wrapRect.height-sh)/2-22;applyCanvasPosition()}function applyZoom(){if(!canvas.width)return;canvas.style.width=`${Math.round(canvas.width*zoom/100)}px`;canvas.style.height=`${Math.round(canvas.height*zoom/100)}px`;applyCanvasPosition();updateHints()}

function clampRect(rect){const x=Math.floor(clamp(rect.x,0,canvas.width)),y=Math.floor(clamp(rect.y,0,canvas.height)),w=Math.floor(clamp(rect.w,0,canvas.width-x)),h=Math.floor(clamp(rect.h,0,canvas.height-y));return{x,y,w,h}}
function strokeBounds(points,size){if(!points.length)return{x:0,y:0,w:0,h:0};let minX=points[0].x,maxX=minX,minY=points[0].y,maxY=minY;for(const p of points){if(p.x<minX)minX=p.x;if(p.x>maxX)maxX=p.x;if(p.y<minY)minY=p.y;if(p.y>maxY)maxY=p.y}const pad=size/2+2;return clampRect({x:minX-pad,y:minY-pad,w:maxX-minX+pad*2,h:maxY-minY+pad*2})}
function buildStrokePath(c,points,ox,oy){if(!points.length)return;c.beginPath();c.moveTo(points[0].x-ox,points[0].y-oy);for(let i=1;i<points.length;i+=1)c.lineTo(points[i].x-ox,points[i].y-oy)}
function drawSquareStroke(target,s,ox,oy){const half=s.size/2;const points=s.points;for(let i=0;i<points.length;i+=1){const p=points[i];target.fillRect(p.x-ox-half,p.y-oy-half,s.size,s.size);if(i===0)continue;const prev=points[i-1];const dx=p.x-prev.x,dy=p.y-prev.y;const dist=Math.hypot(dx,dy);const step=Math.max(1,s.size*0.35);const n=Math.floor(dist/step);for(let j=1;j<n;j+=1){const t=j/n;const x=prev.x+dx*t,y=prev.y+dy*t;target.fillRect(x-ox-half,y-oy-half,s.size,s.size)}}}
function createCheckerPattern(targetCtx){const tile=document.createElement("canvas");tile.width=12;tile.height=12;const t=tile.getContext("2d");t.fillStyle="rgba(255,255,255,.35)";t.fillRect(0,0,12,12);t.fillStyle="rgba(0,0,0,.35)";t.fillRect(0,0,6,6);t.fillRect(6,6,6,6);return targetCtx.createPattern(tile,"repeat")}
function paintStrokeToMask(target,s){target.fillStyle="#fff";target.strokeStyle="#fff";target.lineCap="round";target.lineJoin="round";if(s.shape==="square"){drawSquareStroke(target,s,0,0);return;}target.lineWidth=s.size;buildStrokePath(target,s.points,0,0);if(s.points.length===1){target.beginPath();target.arc(s.points[0].x,s.points[0].y,s.size/2,0,Math.PI*2);target.fill();return;}target.stroke()}
function drawMergedBrushOverlay(strokes){if(!strokes.length)return;const mask=document.createElement("canvas");mask.width=canvas.width;mask.height=canvas.height;const m=mask.getContext("2d");for(const s of strokes)paintStrokeToMask(m,s);const layer=document.createElement("canvas");layer.width=canvas.width;layer.height=canvas.height;const l=layer.getContext("2d");l.fillStyle=createCheckerPattern(l)||"rgba(0,0,0,.2)";l.fillRect(0,0,layer.width,layer.height);l.globalCompositeOperation="destination-in";l.drawImage(mask,0,0);l.globalCompositeOperation="source-over";ctx.drawImage(layer,0,0)}
function drawBrushCursor(){if(!hoverPoint||modeSelect.value!=="brush")return;const size=getBrushSizeCanvasPx();const half=size/2;ctx.save();const checker=createCheckerPattern(ctx);ctx.fillStyle=checker||"rgba(0,0,0,.22)";ctx.strokeStyle="rgba(0,0,0,.9)";ctx.lineWidth=Math.max(1,1.4/getCanvasScale());if(brushShapeInput.value==="square"){ctx.fillRect(hoverPoint.x-half,hoverPoint.y-half,size,size);ctx.strokeRect(hoverPoint.x-half,hoverPoint.y-half,size,size);}else{ctx.beginPath();ctx.arc(hoverPoint.x,hoverPoint.y,half,0,Math.PI*2);ctx.fill();ctx.stroke();}ctx.restore()}
function drawOverlay(){if(!committedImageData)return;const brushStrokes=[];if(pendingItems.length){ctx.save();ctx.fillStyle="rgba(31,111,255,.16)";ctx.strokeStyle="rgba(31,111,255,.95)";ctx.lineWidth=Math.max(1,1.4/getCanvasScale());for(const item of pendingItems){if(item.type==="rect"){const r=item.rect;ctx.fillRect(r.x,r.y,r.w,r.h);ctx.strokeRect(r.x,r.y,r.w,r.h)}else brushStrokes.push(item.stroke)}ctx.restore()}if(liveStroke&&liveStroke.points.length)brushStrokes.push(liveStroke);drawMergedBrushOverlay(brushStrokes);if(previewRect){ctx.save();ctx.strokeStyle="#1f6fff";ctx.setLineDash([7,4]);ctx.lineWidth=Math.max(1,2/getCanvasScale());ctx.strokeRect(previewRect.x,previewRect.y,previewRect.w,previewRect.h);ctx.restore()}drawBrushCursor()}
function syncPreviewBadge(){if(previewInspectBadge)previewInspectBadge.style.display=isPreviewInspect?"block":"none"}
function renderCanvas(){if(!committedImageData){renderEffectPreview();syncPreviewBadge();return;}if(isPreviewInspect&&lastPreviewCanvas){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(lastPreviewCanvas,0,0);renderEffectPreview();syncPreviewBadge();return;}ctx.putImageData(committedImageData,0,0);drawOverlay();renderEffectPreview();syncPreviewBadge()}
function pixelateImageData(src,tileSize){const w=src.width,h=src.height,raw=clamp(Math.max(1,Number(tileSize)||14),1,30),size=raw===1?2:raw,sd=src.data,dst=new ImageData(w,h),dd=dst.data;for(let by=0;by<h;by+=size){for(let bx=0;bx<w;bx+=size){const s=(by*w+bx)*4,r=sd[s],g=sd[s+1],b=sd[s+2],a=sd[s+3],my=Math.min(by+size,h),mx=Math.min(bx+size,w);for(let y=by;y<my;y+=1){for(let x=bx;x<mx;x+=1){const i=(y*w+x)*4;dd[i]=r;dd[i+1]=g;dd[i+2]=b;dd[i+3]=a}}}}return dst}
function makePendingMask(){if(!pendingItems.length)return null;const mask=document.createElement("canvas");mask.width=canvas.width;mask.height=canvas.height;const m=mask.getContext("2d",{willReadFrequently:true});m.fillStyle="#fff";m.strokeStyle="#fff";m.lineCap="round";m.lineJoin="round";let minX=Infinity,minY=Infinity,maxX=-1,maxY=-1;for(const item of pendingItems){if(item.type==="rect"){const r=item.rect;m.fillRect(r.x,r.y,r.w,r.h);minX=Math.min(minX,r.x);minY=Math.min(minY,r.y);maxX=Math.max(maxX,r.x+r.w);maxY=Math.max(maxY,r.y+r.h)}else{const s=item.stroke;if(s.shape==="square"){drawSquareStroke(m,s,0,0);}else{m.lineWidth=s.size;buildStrokePath(m,s.points,0,0);if(s.points.length===1){m.beginPath();m.arc(s.points[0].x,s.points[0].y,s.size/2,0,Math.PI*2);m.fill()}else m.stroke();}const b=strokeBounds(s.points,s.size);minX=Math.min(minX,b.x);minY=Math.min(minY,b.y);maxX=Math.max(maxX,b.x+b.w);maxY=Math.max(maxY,b.y+b.h)}}if(maxX<0||maxY<0)return null;return{mask,bounds:clampRect({x:minX,y:minY,w:maxX-minX,h:maxY-minY})}}
function applyByMaskOnContext(targetCtx,targetCanvas,effect,tileSize){const built=makePendingMask();if(!built)return;const {mask,bounds}=built;if(bounds.w<=0||bounds.h<=0)return;const mctx=mask.getContext("2d",{willReadFrequently:true});const src=targetCtx.getImageData(bounds.x,bounds.y,bounds.w,bounds.h);const sd=src.data;const md=mctx.getImageData(bounds.x,bounds.y,bounds.w,bounds.h).data;const out=targetCtx.createImageData(bounds.w,bounds.h);const od=out.data;let ed=null;if(effect==="mosaic")ed=pixelateImageData(src,tileSize).data;const barRgb=hexToRgb(normalizeHexColor(barColorInput.value));const barOpacity=clamp((Number(barOpacityInput.value)||100)/100,0,1);const direction=barDirectionInput.value==="vertical"?"vertical":"horizontal";const gap=Math.max(0,Math.floor(Number(barGapInput.value)||0));const barThickness=Math.max(2,Math.floor(Number(barWidthInput.value)||16));const step=barThickness+gap;for(let i=0;i<md.length;i+=4){const a=md[i+3]/255;if(a<=0){od[i]=sd[i];od[i+1]=sd[i+1];od[i+2]=sd[i+2];od[i+3]=sd[i+3];continue;}if(effect==="bar"){const pi=i/4;const px=pi%bounds.w;const py=Math.floor(pi/bounds.w);const axis=direction==="vertical"?px:py;const offset=step>0?axis%step:0;const inBar=offset<barThickness;const ea=inBar?a*barOpacity:0;od[i]=Math.round(sd[i]*(1-ea)+barRgb.r*ea);od[i+1]=Math.round(sd[i+1]*(1-ea)+barRgb.g*ea);od[i+2]=Math.round(sd[i+2]*(1-ea)+barRgb.b*ea);od[i+3]=sd[i+3];}else{od[i]=Math.round(sd[i]*(1-a)+ed[i]*a);od[i+1]=Math.round(sd[i+1]*(1-a)+ed[i+1]*a);od[i+2]=Math.round(sd[i+2]*(1-a)+ed[i+2]*a);od[i+3]=sd[i+3];}}targetCtx.putImageData(out,bounds.x,bounds.y)}
function drawPreviewCanvas(ctx2d,sourceCanvas){const w=ctx2d.canvas.width,h=ctx2d.canvas.height;ctx2d.clearRect(0,0,w,h);if(!sourceCanvas.width||!sourceCanvas.height)return;const scale=Math.min(w/sourceCanvas.width,h/sourceCanvas.height);const dw=Math.floor(sourceCanvas.width*scale),dh=Math.floor(sourceCanvas.height*scale);const dx=Math.floor((w-dw)/2),dy=Math.floor((h-dh)/2);ctx2d.fillStyle="#f3f6fb";ctx2d.fillRect(0,0,w,h);ctx2d.drawImage(sourceCanvas,0,0,sourceCanvas.width,sourceCanvas.height,dx,dy,dw,dh)}
function renderEffectPreview(){if(!committedImageData){previewAfterCtx.clearRect(0,0,previewAfter.width,previewAfter.height);lastPreviewCanvas=null;return;}const afterCanvas=document.createElement("canvas");afterCanvas.width=canvas.width;afterCanvas.height=canvas.height;const actx=afterCanvas.getContext("2d",{willReadFrequently:true});actx.putImageData(committedImageData,0,0);if(pendingItems.length){applyByMaskOnContext(actx,afterCanvas,effectModeSelect.value,Number(tileSizeInput.value)||14);}drawPreviewCanvas(previewAfterCtx,afterCanvas);lastPreviewCanvas=afterCanvas}
function enterPreviewInspect(){if(!lastPreviewCanvas||!committedImageData)return;if(!isPreviewInspect){previewResumeStatus=statusMemo;}isPreviewInspect=true;syncModeChip();statusText.textContent=tr("status_preview");renderCanvas()}
function leavePreviewInspect(){if(!isPreviewInspect)return;isPreviewInspect=false;syncModeChip();statusText.textContent=previewResumeStatus||statusMemo;renderCanvas()}
function refreshPendingUI(){const c=pendingItems.length;confirmBtn.disabled=!c;if(c>0){confirmBtn.dataset.count=String(c);}else{confirmBtn.removeAttribute("data-count");}}
function refreshHistoryUI(){undoBtn.disabled=historyIndex<=0;redoBtn.disabled=historyIndex>=history.length-1;historyList.innerHTML="";for(let i=history.length-1;i>=0;i-=1){const b=document.createElement("button");b.type="button";b.className="hbtn"+(i===historyIndex?" active":"");b.textContent=`${i}. ${history[i].label}`;b.dataset.index=String(i);historyList.appendChild(b)}}
function pushHistorySnapshot(label){if(!committedImageData)return;if(historyIndex<history.length-1)history.splice(historyIndex+1);history.push({label,imageData:cloneImageData(committedImageData)});if(history.length>HISTORY_LIMIT)history.shift();historyIndex=history.length-1;refreshHistoryUI()}
function restoreFromHistory(index){if(index<0||index>=history.length)return;historyIndex=index;committedImageData=cloneImageData(history[index].imageData);pendingItems=[];liveStroke=null;previewRect=null;refreshPendingUI();refreshHistoryUI();renderCanvas()}
function hexToRgb(hex){const h=(hex||"#000000").replace("#","");const full=h.length===3?`${h[0]}${h[0]}${h[1]}${h[1]}${h[2]}${h[2]}`:h;const n=parseInt(full,16);if(Number.isNaN(n))return{r:0,g:0,b:0};return{r:(n>>16)&255,g:(n>>8)&255,b:n&255}}
function applyByMask(effect,tileSize){applyByMaskOnContext(ctx,canvas,effect,tileSize)}
function addPendingRect(x,y,w,h){if(!canvas.width)return;const rect=clampRect(normalizeRect(x,y,w,h));if(rect.w<=0||rect.h<=0)return;pendingItems.push({type:"rect",rect});refreshPendingUI();renderCanvas()}
function addPendingStroke(points,size,shape){if(!points.length)return;pendingItems.push({type:"stroke",stroke:{points,size,shape:shape||"circle"}});refreshPendingUI();renderCanvas()}
function applySelectedEffect(){if(!committedImageData||!pendingItems.length)return;ctx.putImageData(committedImageData,0,0);const effect=effectModeSelect.value,tile=Number(tileSizeInput.value)||14;applyByMask(effect,tile);committedImageData=ctx.getImageData(0,0,canvas.width,canvas.height);pendingItems=[];liveStroke=null;previewRect=null;refreshPendingUI();renderCanvas();pushHistorySnapshot(effect==="bar"?tr("mode_chip_applied_nori"):tr("mode_chip_applied_mosaic"));setStatus(effect==="bar"?tr("mode_chip_applied_nori"):tr("mode_chip_applied_mosaic"))}
function resetWorkspaceState(){history.length=0;historyIndex=-1;pendingItems=[];liveStroke=null;previewRect=null;refreshPendingUI();refreshHistoryUI()}
function loadImage(file){const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{canvas.width=img.width;canvas.height=img.height;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0);baseImageData=ctx.getImageData(0,0,canvas.width,canvas.height);committedImageData=cloneImageData(baseImageData);zoom=Math.min(100,fitZoomPercent());panX=0;panY=0;applyZoom();centerView();resetWorkspaceState();pushHistorySnapshot(tr("status_loaded"));renderCanvas();setStatus(`${tr("status_loaded")}: ${img.width} x ${img.height}`);URL.revokeObjectURL(url)};img.src=url}
function beginDrawing(e){if(!committedImageData||e.button!==0)return;isDrawing=true;dragged=false;startPoint=getPointer(e);if(modeSelect.value==="brush"){liveStroke={points:[startPoint],size:getBrushSizeCanvasPx(),shape:brushShapeInput.value||"circle"};renderCanvas()}}
function continueDrawing(e){if(!committedImageData)return;hoverPoint=getPointer(e);if(!isDrawing||!startPoint){renderCanvas();return;}const p=hoverPoint,dx=p.x-startPoint.x,dy=p.y-startPoint.y;if(Math.abs(dx)>2||Math.abs(dy)>2)dragged=true;if(modeSelect.value==="brush"){if(!liveStroke)liveStroke={points:[p],size:getBrushSizeCanvasPx(),shape:brushShapeInput.value||"circle"};else liveStroke.points.push(p);renderCanvas();return;}previewRect=clampRect(normalizeRect(startPoint.x,startPoint.y,dx,dy));renderCanvas()}
function endDrawing(e){if(!isDrawing||!startPoint||!committedImageData)return;isDrawing=false;if(modeSelect.value==="brush"){if(liveStroke&&liveStroke.points.length)addPendingStroke(liveStroke.points.slice(),liveStroke.size,liveStroke.shape);liveStroke=null;startPoint=null;renderCanvas();return;}const p=getPointer(e),dx=p.x-startPoint.x,dy=p.y-startPoint.y;if(Math.abs(dx)>1||Math.abs(dy)>1)addPendingRect(startPoint.x,startPoint.y,dx,dy);previewRect=null;startPoint=null;renderCanvas()}
function syncBarControls(){const isBar=effectModeSelect.value==="bar";barColorInput.disabled=!isBar;barColorPicker.disabled=!isBar;barOpacityInput.disabled=!isBar;barWidthInput.disabled=!isBar;barGapInput.disabled=!isBar;barDirectionInput.disabled=!isBar;if(barColorSwatches){for(const btn of barColorSwatches.querySelectorAll(".swatch-btn"))btn.disabled=!isBar}}
fileInput.addEventListener("change",(e)=>{const f=e.target.files&&e.target.files[0];if(f)loadImage(f)});
canvas.addEventListener("mousedown",beginDrawing);
canvas.addEventListener("mousemove",continueDrawing);
canvas.addEventListener("mouseup",endDrawing);
canvas.addEventListener("mouseleave",(e)=>{hoverPoint=null;if(isDrawing)endDrawing(e);else renderCanvas()});
window.addEventListener("mouseup",()=>{if(isDrawing){isDrawing=false;liveStroke=null;previewRect=null;startPoint=null;renderCanvas();}});
canvasWrap.addEventListener("wheel",(e)=>{if(e.target.closest(".stage-tools")||e.target.closest(".stage-right"))return;if(!committedImageData)return;e.preventDefault();setZoom(zoom+(e.deltaY<0?10:-10),e)},{passive:false});
zoomResetBtn.addEventListener("click",()=>{if(!committedImageData)return;zoom=Math.min(100,fitZoomPercent());applyZoom();centerView();setStatus(zoom<100?`${tr("status_reset_view_fit")} (${zoom}%)`:tr("status_reset_view_100"));});


confirmBtn.addEventListener("click",applySelectedEffect);
clearSelBtn.addEventListener("click",()=>{pendingItems=[];liveStroke=null;previewRect=null;refreshPendingUI();renderCanvas();setStatus(tr("status_cleared"))});
undoBtn.addEventListener("click",()=>{if(historyIndex<=0)return;restoreFromHistory(historyIndex-1);setStatus(tr("status_undo"))});

resetBtn.addEventListener("click",()=>{if(!baseImageData)return;committedImageData=cloneImageData(baseImageData);pendingItems=[];liveStroke=null;previewRect=null;refreshPendingUI();renderCanvas();pushHistorySnapshot(tr("status_reset_image"));setStatus(tr("status_reset_image"))});
downloadBtn.addEventListener("click",()=>{if(!committedImageData)return;ctx.putImageData(committedImageData,0,0);const link=document.createElement("a");link.download="mosaic-output.png";link.href=canvas.toDataURL("image/png");link.click();renderCanvas()});

tileSizeInput.addEventListener("input",()=>{updateHints();renderCanvas();});brushSizeInput.addEventListener("input",()=>{updateHints();renderCanvas();});brushShapeInput.addEventListener("change",renderCanvas);barOpacityInput.addEventListener("input",()=>{updateHints();renderCanvas();});barColorInput.addEventListener("input",()=>{const raw=String(barColorInput.value||"").trim();if(/^#[0-9a-fA-F]{3}$/.test(raw)||/^#[0-9a-fA-F]{6}$/.test(raw)){const normalized=normalizeHexColor(raw);barColorPicker.value=normalized;syncSwatchActive();renderCanvas();}});barColorInput.addEventListener("blur",()=>{barColorInput.value=normalizeHexColor(barColorInput.value);barColorPicker.value=barColorInput.value;syncSwatchActive();renderCanvas();});barColorPicker.addEventListener("input",()=>{barColorInput.value=normalizeHexColor(barColorPicker.value);syncSwatchActive();renderCanvas();});if(barColorSwatches){barColorSwatches.addEventListener("click",(e)=>{const btn=e.target.closest(".swatch-btn");if(!btn)return;barColorInput.value=normalizeHexColor(btn.dataset.color||"#000000");barColorPicker.value=barColorInput.value;syncSwatchActive();renderCanvas();});}barWidthInput.addEventListener("input",()=>{updateHints();renderCanvas();});barGapInput.addEventListener("input",()=>{updateHints();renderCanvas();});barDirectionInput.addEventListener("change",renderCanvas);effectModeSelect.addEventListener("change",()=>{syncBarControls();syncToggleButtons();renderCanvas();});
if(modeToggle){modeToggle.addEventListener("click",(e)=>{const btn=e.target.closest(".seg-btn");if(!btn)return;const value=btn.dataset.value;if(value!==modeSelect.value){modeSelect.value=value;modeSelect.dispatchEvent(new Event("change"));}});}
if(effectModeToggle){effectModeToggle.addEventListener("click",(e)=>{const btn=e.target.closest(".seg-btn");if(!btn)return;const value=btn.dataset.value;if(value!==effectModeSelect.value){effectModeSelect.value=value;effectModeSelect.dispatchEvent(new Event("change"));}});}

barColorInput.value=normalizeHexColor(barColorInput.value);barColorPicker.value=barColorInput.value;lang=langSelect.value;applyI18n();syncSwatchActive();syncModeChip();syncToggleButtons();syncBarControls();updateHints();refreshPendingUI();refreshHistoryUI();
