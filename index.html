<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mosaic Studio</title>
    <style>
      body {
        margin: 0;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      }

      .boot-msg {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(145deg, #f6f9ff 0%, #eef4ff 100%);
        color: #152136;
      }

      .boot-card {
        width: min(680px, 92vw);
        border: 1px solid rgba(83, 102, 134, 0.22);
        border-radius: 16px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.88);
      }

      .boot-card h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      .boot-card p {
        margin: 8px 0;
        color: #49566c;
      }

      .boot-card pre {
        margin: 12px 0 0;
        padding: 12px;
        border-radius: 10px;
        background: #0f172a;
        color: #f8fafc;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if (location.protocol === "file:") {
        setTimeout(() => {
          const root = document.getElementById("root");
          if (root && root.childElementCount === 0) {
            root.innerHTML = `
              <div class="boot-msg">
                <div class="boot-card">
                  <h1>這是 React 打包專案</h1>
                  <p>不要直接雙擊原始碼資料夾的 <code>index.html</code>。</p>
                  <p>請用以下方式：</p>
                  <pre>npm install
npm run dev</pre>
                </div>
              </div>
            `;
          }
        }, 250);
      }
    </script>
  </body>
</html>
